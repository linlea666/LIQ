services:
  backend:
    build: ./backend
    container_name: liq-backend
    restart: always
    ports:
      - "8800:8000"
    env_file:
      - ./backend/.env
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE: http://8.217.240.76:8800
        NEXT_PUBLIC_WS_URL: http://8.217.240.76:8800
    container_name: liq-frontend
    restart: always
    ports:
      - "8801:3000"
    depends_on:
      - backend
